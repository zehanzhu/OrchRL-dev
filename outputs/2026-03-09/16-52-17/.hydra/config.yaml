models:
  model_0:
    ppo_trainer_config:
      data:
        tokenizer: null
        use_shm: false
        train_batch_size: 128
        val_batch_size: 32
        prompt_key: prompt
        reward_fn_key: data_source
        max_prompt_length: ${training.max_prompt_length}
        max_response_length: ${training.max_response_length}
        dataloader_num_workers: 0
        return_raw_input_ids: false
        return_raw_chat: false
        return_full_prompt: false
        shuffle: true
        filter_overlong_prompts: false
        filter_overlong_prompts_workers: 1
        truncation: error
        image_key: images
        video_key: videos
        trust_remote_code: false
        custom_cls:
          path: null
          name: null
        sampler:
          class_path: null
          class_name: null
        class_path: null
        class_name: null
      actor_rollout_ref:
        hybrid_engine: true
        model:
          path: ${base_models.policy_0.path}
          use_shm: false
          external_lib: null
          override_config: {}
          enable_gradient_checkpointing: true
          enable_activation_offload: true
          use_remove_padding: true
          lora_rank: 0
          lora_alpha: 16
          target_modules: all-linear
          use_liger: false
          use_fused_kernels: false
          trust_remote_code: false
        actor:
          _target_: verl.workers.config.FSDPActorConfig
          strategy: fsdp
          ppo_mini_batch_size: 16
          use_dynamic_bsz: true
          use_dynamic_mini_batch: false
          ppo_micro_batch_size: 4
          ppo_micro_batch_size_per_gpu: 49152
          ppo_max_token_len_per_gpu: 8192
          grad_clip: 1.0
          clip_ratio: 0.2
          clip_ratio_low: 0.2
          clip_ratio_high: 0.2
          clip_ratio_c: 3.0
          loss_agg_mode: token-mean
          entropy_coeff: 0
          use_kl_loss: false
          use_torch_compile: false
          kl_loss_coef: 0.001
          kl_loss_type: low_var_kl
          ppo_epochs: 1
          shuffle: false
          ulysses_sequence_parallel_size: 1
          checkpoint:
            contents:
            - model
            - optimizer
            - extra
          optim:
            lr: 1.0e-06
            lr_warmup_steps: -1
            lr_warmup_steps_ratio: 0.0
            min_lr_ratio: null
            num_cycles: 0.5
            warmup_style: constant
            total_training_steps: -1
            weight_decay: 0.01
          fsdp_config:
            _target_: verl.workers.config.FSDPEngineConfig
            wrap_policy:
              min_num_params: 0
            param_offload: false
            optimizer_offload: false
            offload_policy: true
            reshard_after_forward: true
            fsdp_size: -1
            model_dtype: bf16
          grad_norm_threshold: 100000.0
        ref:
          strategy: fsdp
          fsdp_config:
            _target_: verl.workers.config.FSDPEngineConfig
            model_dtype: bf16
            param_offload: false
            reshard_after_forward: true
            wrap_policy:
              min_num_params: 0
          use_torch_compile: false
          log_prob_micro_batch_size: 1
          log_prob_micro_batch_size_per_gpu: 4
          log_prob_use_dynamic_bsz: true
          ppo_micro_batch_size: 1
          ppo_micro_batch_size_per_gpu: 4
          log_prob_max_token_len_per_gpu: 8192
          ulysses_sequence_parallel_size: 1
          entropy_from_logits_with_chunking: false
        rollout:
          enable_lora: false
          max_loras: 1
          max_lora_rank: 0
          name: vllm
          _target_: verl.workers.config.RolloutConfig
          mode: async
          chat_scheduler: verl.schedulers.completions_scheduler.CompletionsScheduler
          chat_template: null
          temperature: ${training.sample_temperature}
          top_k: -1
          top_p: 1
          use_fire_sampling: false
          prompt_length: ${training.max_prompt_length}
          response_length: ${training.max_response_length}
          dtype: bfloat16
          gpu_memory_utilization: 0.6
          ignore_eos: false
          enforce_eager: false
          free_cache_engine: false
          load_format: auto
          layered_summon: false
          tensor_model_parallel_size: 1
          max_num_batched_tokens: 8192
          max_model_len: null
          max_num_seqs: 64
          log_prob_micro_batch_size: 4
          log_prob_micro_batch_size_per_gpu: null
          log_prob_use_dynamic_bsz: false
          log_prob_max_token_len_per_gpu: 24576
          disable_log_stats: true
          enable_chunked_prefill: true
          do_sample: true
          'n': 1
          engine_kwargs:
            vllm:
              swap_space: null
            sglang:
              attention_backend: null
          val_kwargs:
            top_k: -1
            top_p: 1.0
            temperature: 0
            'n': 1
            do_sample: false
          multi_turn:
            enable: false
            max_turns: 4
            tool_config_path: null
            format: chatml
          disable_logging: true
          entropy_from_logits_with_chunking: false
          use_torch_compile: false
          agent:
            num_workers: 64
            agent_loop_config_path: null
            custom_async_server:
              path: null
              name: null
        trainer:
          n_gpus_per_node: 1
          n_training_gpus_per_node: 1
      critic:
        _target_: verl.workers.config.FSDPCriticConfig
        enable: false
        strategy: fsdp
        optim:
          _target_: verl.workers.config.FSDPOptimizerConfig
          lr: 1.0e-05
          lr_warmup_steps_ratio: 0.0
          total_training_steps: -1
          weight_decay: 0.01
          lr_warmup_steps: -1
          min_lr_ratio: null
          warmup_style: constant
        model:
          _target_: verl.workers.config.FSDPCriticModelCfg
          path: ~/models/deepseek-llm-7b-chat
          tokenizer_path: ${oc.select:actor_rollout_ref.model.path,"~/models/deepseek-llm-7b-chat"}
          override_config: {}
          external_lib: ${oc.select:actor_rollout_ref.model.external_lib,null}
          trust_remote_code: ${oc.select:actor_rollout_ref.model.trust_remote_code,false}
          use_shm: false
          enable_gradient_checkpointing: true
          enable_activation_offload: false
          use_remove_padding: false
          fsdp_config:
            _target_: verl.workers.config.FSDPEngineConfig
            param_offload: false
            optimizer_offload: false
            offload_policy: false
            reshard_after_forward: true
            wrap_policy:
              min_num_params: 0
            fsdp_size: -1
            forward_prefetch: false
          lora_rank: 0
          lora_alpha: 16
          target_modules: all-linear
        forward_micro_batch_size: ${oc.select:.ppo_micro_batch_size,null}
        forward_micro_batch_size_per_gpu: ${oc.select:.ppo_micro_batch_size_per_gpu,null}
        ulysses_sequence_parallel_size: 1
        grad_clip: 1.0
      reward_model:
        enable: false
        strategy: fsdp
        model:
          input_tokenizer: ~/models/deepseek-llm-7b-chat
          path: ~/models/FsfairX-LLaMA3-RM-v0.1
          use_shm: false
          external_lib: null
          use_remove_padding: false
          use_fused_kernels: false
          trust_remote_code: false
          fsdp_config:
            wrap_policy:
              min_num_params: 0
            param_offload: false
            reshard_after_forward: true
            fsdp_size: -1
        micro_batch_size: null
        micro_batch_size_per_gpu: null
        max_length: null
        ulysses_sequence_parallel_size: 1
        use_dynamic_bsz: false
        forward_max_token_len_per_gpu: 32768
        reward_manager: naive
        launch_reward_fn_async: false
        sandbox_fusion:
          url: null
          max_concurrent: 64
      custom_reward_function:
        path: null
        name: compute_score
      algorithm:
        adv_estimator: grpo
        gamma: 1.0
        lam: 1.0
        norm_adv_by_std_in_grpo: true
        use_kl_in_reward: false
        kl_penalty: kl
        kl_ctrl:
          type: fixed
          kl_coef: 0.001
          horizon: 10000
          target_kl: 0.1
        use_pf_ppo: false
        pf_ppo:
